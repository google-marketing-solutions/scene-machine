<div class="dialog-container">
  <h2 mat-dialog-title>Add a new scene</h2>
  <div mat-dialog-content>
    <div class="options-container">
      <button class="option-card generate-option" (click)="selectGenerate()">
        <div class="icon-wrapper">
          <mat-icon>auto_awesome</mat-icon>
        </div>
        <h3>Generate with Veo</h3>
        <p>Create a scene using AI generation</p>
      </button>

      <div
        class="option-card upload-option"
        (click)="fileInput.click()"
        (dragover)="onDragOver($event)"
        (drop)="onDrop($event)"
      >
        <div class="icon-wrapper">
          <mat-icon>upload_file</mat-icon>
        </div>
        <h3>Upload existing video</h3>
        <p>Drag & drop or click to upload</p>
        <input
          #fileInput
          type="file"
          accept="video/*"
          style="display: none"
          (change)="onFileSelected($event)"
        />
      </div>
    </div>
  </div>
  <div mat-dialog-actions align="end">
    <button mat-button mat-dialog-close>Cancel</button>
  </div>
</div>
