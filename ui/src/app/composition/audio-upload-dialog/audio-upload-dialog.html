<h2 mat-dialog-title>{{ isEditMode() ? 'Edit' : 'Add' }} Audio Track</h2>

<mat-dialog-content>
  <div class="file-upload-container">
    @if (selectedFile() || existingFileName()) {
      <div class="selected-file">
        <span>{{ selectedFile()?.name || existingFileName() }}</span>
      </div>
      <button matButton="outlined" (click)="clearFile()">Remove File</button>
    } @else {
      <div
        class="upload-area"
        (click)="fileInput.click()"
        (dragover)="onDragOver($event)"
        (drop)="onDrop($event)"
      >
        <div class="upload-content">
          <mat-icon class="upload-icon">upload_file</mat-icon>
          <p>Drag & drop or click to upload audio</p>
        </div>
        <input
          type="file"
          accept="audio/*"
          #fileInput
          (change)="onFileSelected($event)"
          style="display: none"
        />
      </div>
    }
    <audio
      #audioPlayer
      controls
      [src]="audioUrl()"
      [hidden]="!audioUrl()"
      (loadedmetadata)="loadedMetadataHandler()"
      style="width: 100%; margin-top: 8px"
    ></audio>
  </div>

  <div class="row">
    <app-scene-selector
      label="Start time (s)"
      [(value)]="startSeconds"
      [sceneTimings]="data!.sceneTimings"
      useSceneTiming="start"
    ></app-scene-selector>
    <app-scene-selector
      label="End time (s)"
      [(value)]="endSeconds"
      [sceneTimings]="data!.sceneTimings"
      useSceneTiming="end"
    ></app-scene-selector>
  </div>
  @if (isInvalidTimeRange()) {
    <div class="error-message">
      End time should not be earlier than start time.
    </div>
  }
</mat-dialog-content>

<mat-dialog-actions>
  <button mat-button (click)="close()" [disabled]="isUploading()">Cancel</button>
  <button
    mat-flat-button
    color="primary"
    (click)="onAdd()"
    [disabled]="(!selectedFile() && !existingFileName()) || isUploading() || isInvalidTimeRange()"
  >
    {{ isUploading() ? 'Uploading...' : isEditMode() ? 'Save Changes' : 'Add Track' }}
  </button>
</mat-dialog-actions>
