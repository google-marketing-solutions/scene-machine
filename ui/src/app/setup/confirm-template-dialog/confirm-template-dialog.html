<div class="dialog-container">
  <h2 mat-dialog-title>Switch Template</h2>
  <mat-dialog-content>
    This will clear your current composition.<br />
    Are you sure you want to continue?
  </mat-dialog-content>
  <mat-dialog-actions align="end">
    <button mat-button [mat-dialog-close]="false">Cancel</button>
    <button
      mat-button
      color="primary"
      [mat-dialog-close]="true"
      cdkFocusInitial
    >
      Switch
    </button>
  </mat-dialog-actions>
</div>
