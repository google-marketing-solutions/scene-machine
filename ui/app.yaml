runtime: python313

handlers:
  - url: /status/callBackend.js
    static_files: remix-engine-status-viewer/callBackend.js
    upload: remix-engine-status-viewer/callBackend.js

  - url: /status/re.css
    static_files: remix-engine-status-viewer/re.css
    upload: remix-engine-status-viewer/re.css

  - url: /status/renderWorkflow.js
    static_files: remix-engine-status-viewer/renderWorkflow.js
    upload: remix-engine-status-viewer/renderWorkflow.js

  - url: /status
    static_files: remix-engine-status-viewer/status.html
    upload: remix-engine-status-viewer/status.html

  - url: /definitions/actions.json
    static_files: definitions/actions.json
    upload: definitions/actions.json

  - url: /definitions/config.json
    static_files: definitions/config.json
    upload: definitions/config.json

  - url: /(.*(.js|.css|.ico|.png))
    static_files: dist/ui/browser/\1
    upload: dist/ui/browser/(.*(.js|.css|.ico|.png))

  - url: /(.*)
    static_files: dist/ui/browser/index.html
    upload: dist/ui/browser/index.html
